<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>黑马点评</title>
  <!-- 引入样式 -->
  <link rel="stylesheet" href="./css/element.css">

  <link href="./css/shop-list.css" rel="stylesheet">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/chat.css" rel="stylesheet">

  <style type="text/css">

  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">{{typeName}}</div>
    <div class="header-search">
      <i class="el-icon-search"></i>
    </div>
  </div>
  <div class="sort-bar">
    <div class="sort-item">
      <el-dropdown trigger="click" @command="handleCommand">
      <span class="el-dropdown-link">
        {{typeName}}<i class="el-icon-arrow-down el-icon--right"></i>
      </span>
        <el-dropdown-menu slot="dropdown">
          <el-dropdown-item v-for="t in types" :key="t.id" :command="t">
            {{t.name}}
          </el-dropdown-item>
        </el-dropdown-menu>
      </el-dropdown>
    </div>
    <div class="sort-item" @click="sortAndQuery('')">
      距离 <i class="el-icon-arrow-down el-icon--right"></i>
    </div>
    <div class="sort-item" @click="sortAndQuery('comments')">
      人气 <i class="el-icon-arrow-down el-icon--right"></i>
    </div>
    <div class="sort-item" @click="sortAndQuery('score')">
      评分 <i class="el-icon-arrow-down el-icon--right"></i>
    </div>
  </div>
  <div class="shop-list">
    <div class="shop-box" v-for="s in shops" :key="s.id" @click="toDetail(s.id)">
      <div class="shop-img"><img :src="s.images" alt=""></div>
      <div class="shop-info">
        <div class="shop-title shop-item">{{s.name}}</div>
        <div class="shop-rate shop-item" >
          <el-rate
              disabled v-model="s.score/10"
              text-color="#F63"
              show-score
          ></el-rate>
          <span>{{s.comments}}条</span>
        </div>
        <div class="shop-area shop-item">
          <span>{{s.area}}</span>
          <span v-if="s.distance">{{s.distance < 1000 ? s.distance.toFixed(1) + 'm' : (s.distance/1000).toFixed(1) + 'km'}}</span>
        </div>
        <div class="shop-avg shop-item">￥{{s.avgPrice}}/人</div>
        <div class="shop-address shop-item">
          <i class="el-icon-map-location"></i>
          <span>{{s.address}}</span>
        </div>
      </div>
    </div>
    <div style="text-align:center;padding:12px;color:#909399;font-size:12px;" v-if="!hasMore">— 已加载全部 —</div>
    <div style="text-align:center;padding:12px;" v-if="loadingMore">加载中...</div>
  </div>
</div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<!-- 引入组件库 -->
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script>

  const app = new Vue({
    el: "#app",
    data: {
      util,
      hasMore: true,
      loadingMore: false,
      types: [], // 类型列表
      shops: [], // 商店列表
      typeName: "",
      params:{
        typeId: 0,
        current: 1,
        sortBy: "",
        x: 120.149993, // 经度（后端 Redis geo 为空时自动从 MySQL 加载）
        y: 30.334229   // 纬度
      },
    },
    created() {
      this.params.typeId = util.getUrlParam("type");
      this.typeName = util.getUrlParam("name");
      this.queryTypes();
      this.sortAndQuery('');
    },
    mounted() {
      this._scrollHandler = this.onScroll.bind(this);
      window.addEventListener('scroll', this._scrollHandler);
    },
    beforeDestroy() {
      window.removeEventListener('scroll', this._scrollHandler);
    },
    methods: {
      queryTypes() {
        axios.get("/shop-type/list")
          .then(({data}) => {
            this.types = data;
          })
          .catch(err => {
            console.log(err);
            this.$message.error(err)
          })
      },
      queryShops(isAppend) {
        var self = this;
        if (isAppend) {
          this.loadingMore = true;
        }
        axios.get("/shop/of/type", {
            params: this.params
          })
          .then(function(res) {
            var data = res.data;
            if (!data || data.length === 0) {
              self.hasMore = false;
              return;
            }
            data.forEach(function(s) { s.images = s.images.split(',')[0]; });
            if (isAppend) {
              self.shops = self.shops.concat(data);
            } else {
              self.shops = data;
            }
            self.hasMore = data.length >= 5;
          })
          .catch(function(err) {
            console.log(err);
            self.$message.error(err);
          })
          .finally(function() {
            self.loadingMore = false;
          });
      },
      handleCommand(t) {
        location.href = "/shop-list.html?type="+t.id+"&name="+t.name;
      },
      sortAndQuery(sortBy) {
        this.params.sortBy = sortBy;
        this.params.current = 1;
        this.shops = [];
        this.hasMore = true;
        this.loadingMore = false;
        this.queryShops(false);
      },
      goBack() {
        history.back();
      },
      toDetail(id) {
        location.href = "/shop-detail.html?id="+id
      },
      onScroll() {
        if (this._scrollTimer) return;
        var self = this;
        this._scrollTimer = setTimeout(function() {
          self._scrollTimer = null;
          var st = window.pageYOffset || document.documentElement.scrollTop;
          var ch = document.documentElement.clientHeight;
          var sh = document.documentElement.scrollHeight;
          if (st + ch >= sh - 80 && self.hasMore && !self.loadingMore) {
            self.params.current++;
            self.queryShops(true);
          }
        }, 200);
      },
    }
  })
</script>
<script src="./js/chat.js"></script>
</body>
</html>
