server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://your-mysql-host:3306/hmdp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: your-database-password
    hikari:
      maximum-pool-size: 4            # 远程共享 MySQL，连接数受限
      minimum-idle: 1
      idle-timeout: 300000            # 5分钟空闲后回收
      max-lifetime: 600000            # 10分钟最大生命周期（需 < MySQL wait_timeout）
      connection-timeout: 10000       # 获取连接超时 10s
      validation-timeout: 5000        # 连接验证超时 5s
      connection-test-query: SELECT 1
  redis:
    host: your-redis-host
    port: 6379
    password: your-redis-password
    timeout: 8s
    client-type: jedis
    jedis:
      pool:
        max-active: 10
        max-idle: 0                   # 不复用空闲连接——避免远程断连后超时
        min-idle: 0
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  type-aliases-package: com.hmdp.entity
logging:
  level:
    com.hmdp: debug

deepseek:
  api-key: your-deepseek-api-key
  # 走本地代理（自动修复 role=function -> role=tool），无需直接调用 DeepSeek
  base-url: http://localhost:${server.port}/api/deepseek-proxy
  real-base-url: https://api.deepseek.com  # 代理最终转发的目标
  model: deepseek-chat
  temperature: 0.7
  max-tokens: 2000
  timeout-seconds: 60

# ========== RAG 配置 ==========
rag:
  qdrant:
    host: http://localhost
    port: 6333
    collection: hmdp_knowledge
    vector-size: 1024
    distance: Cosine

  embedding:
    # 方案一：本地 Ollama
    base-url: http://localhost:11434/v1
    api-key: ollama
    model: bge-m3
    # 方案二：硅基流动 SiliconCloud
    # base-url: https://api.siliconflow.cn/v1
    # api-key: your-siliconflow-api-key
    # model: BAAI/bge-large-zh-v1.5

  retrieval:
    top-k: 5
    score-threshold: 0.3

  splitter:
    chunk-size: 500
    chunk-overlap: 50

  # 文档自动摄入（markitdown CLI）
  document:
    enabled: true
    watch-dir: ./rag-documents
    state-file: ./rag-doc-state.json
    debounce-seconds: 5
    full-scan-interval-seconds: 300
    watch-file-extensions: pdf,docx,doc,pptx,ppt,xlsx,xls,html,htm,csv,json,xml,epub,md,txt
    markitdown-command: python -m markitdown
    timeout-seconds: 300

# ========== Agent 配置 ==========
agent:
  graph:
    max-iterations: 8
    max-retries: 3
    llm-error-classify: true          # LLM 辅助错误分类（模糊错误语义判断）
  # PostgreSQL（Checkpoint + 用户画像共用）
  postgres:
    url: jdbc:postgresql://your-postgres-host:5432/hmdp
    username: postgres
    password: your-postgres-password
  memory:
    compression:
      enabled: true
      compress-threshold: 4000        # 总 token 超过此值触发压缩
      keep-recent-tokens: 2000        # 保留最近 N tokens 不压缩
      max-summary-tokens: 500         # 压缩摘要最大 token 数
      max-uncompressed-messages: 50   # 硬上限：最多保留消息数（兜底）
