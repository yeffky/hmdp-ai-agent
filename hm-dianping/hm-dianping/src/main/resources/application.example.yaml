server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://your-mysql-host:3306/hmdp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: your-database-password
  redis:
    host: your-redis-host
    port: 6379
    password: your-redis-password
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  type-aliases-package: com.hmdp.entity
logging:
  level:
    com.hmdp: debug

deepseek:
  api-key: your-deepseek-api-key
  base-url: https://api.deepseek.com/v1
  model: deepseek-chat
  temperature: 0.7
  max-tokens: 2000
  timeout-seconds: 60

# ========== RAG 配置 ==========
rag:
  qdrant:
    host: http://localhost
    port: 6333
    collection: hmdp_knowledge
    vector-size: 1024
    distance: Cosine

  embedding:
    # 方案一：本地 Ollama
    base-url: http://localhost:11434/v1
    api-key: ollama
    model: bge-m3
    # 方案二：硅基流动 SiliconCloud
    # base-url: https://api.siliconflow.cn/v1
    # api-key: your-siliconflow-api-key
    # model: BAAI/bge-large-zh-v1.5

  retrieval:
    top-k: 5
    score-threshold: 0.3

  splitter:
    chunk-size: 500
    chunk-overlap: 50
