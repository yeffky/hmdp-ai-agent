server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://your-mysql-host:3306/hmdp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: your-database-password
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 120000
      max-lifetime: 180000         # 必须 < MySQL wait_timeout
      keepalive-time: 60000        # 每分钟心跳防断连
      connection-test-query: SELECT 1
  redis:
    host: your-redis-host
    port: 6379
    password: your-redis-password
    timeout: 8s
    client-type: jedis
    jedis:
      pool:
        max-active: 10
        max-idle: 0             # 不复用空闲连接——避免远程断连后超时
        min-idle: 0
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  type-aliases-package: com.hmdp.entity
logging:
  level:
    com.hmdp: debug

deepseek:
  api-key: your-deepseek-api-key
  # 走本地代理（自动修复 role=function -> role=tool），无需直接调用 DeepSeek
  base-url: http://localhost:8081/api/deepseek-proxy/v1
  real-base-url: https://api.deepseek.com/v1   # 代理最终转发的目标
  model: deepseek-chat
  temperature: 0.7
  max-tokens: 2000
  timeout-seconds: 60

# ========== RAG 配置 ==========
rag:
  qdrant:
    host: http://localhost
    port: 6333
    collection: hmdp_knowledge
    vector-size: 1024
    distance: Cosine

  embedding:
    # 方案一：本地 Ollama
    base-url: http://localhost:11434/v1
    api-key: ollama
    model: bge-m3
    # 方案二：硅基流动 SiliconCloud
    # base-url: https://api.siliconflow.cn/v1
    # api-key: your-siliconflow-api-key
    # model: BAAI/bge-large-zh-v1.5

  retrieval:
    top-k: 5
    score-threshold: 0.3

  splitter:
    chunk-size: 500
    chunk-overlap: 50
